<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Stats</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 320px;
      background: #1a1d27;
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid #2a2d3a;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .count-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .count {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
      transition: color 0.3s ease;
    }

    .count.alert {
      color: #f87171;
    }

    .count.warning {
      color: #fbbf24;
    }

    .count.clear {
      color: #34d399;
    }

    .unit {
      font-size: 14px;
      color: #6b7280;
      font-weight: 400;
    }

    .footer {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #6b7280;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 2s infinite;
    }

    .dot.error {
      background: #f87171;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .updated {
      font-size: 11px;
      color: #4b5563;
    }

    .error-msg {
      display: none;
      margin-top: 10px;
      font-size: 11px;
      color: #f87171;
    }

    @keyframes flash-warning {
      0%, 100% { background: #1a1d27; border-color: #2a2d3a; }
      50% { background: #2d2510; border-color: #fbbf24; }
    }

    @keyframes flash-alert {
      0%, 100% { background: #1a1d27; border-color: #2a2d3a; }
      50% { background: #2d1010; border-color: #f87171; }
    }

    .card.flashing-warning {
      animation: flash-warning 1s ease-in-out infinite;
    }

    .card.flashing-alert {
      animation: flash-alert 0.6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Calls waiting</div>
    <div class="count-row">
      <div class="count" id="count">—</div>
      <div class="unit" id="unit"></div>
    </div>
    <div class="footer">
      <div class="status">
        <div class="dot" id="dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
      <div class="updated" id="updated"></div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://n8n.processunlocked.com/webhook/talkdesk-queue-stats';
    const POLL_INTERVAL = 10000; // 10 seconds

    const countEl = document.getElementById('count');
    const unitEl = document.getElementById('unit');
    const dotEl = document.getElementById('dot');
    const statusEl = document.getElementById('status-text');
    const updatedEl = document.getElementById('updated');
    const errorEl = document.getElementById('error-msg');

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    const cardEl = document.querySelector('.card');

    function setCount(n) {
      countEl.textContent = n;
      unitEl.textContent = n === 1 ? 'call' : 'calls';

      countEl.classList.remove('alert', 'warning', 'clear');
      cardEl.classList.remove('flashing-warning', 'flashing-alert');

      if (n === 0) {
        countEl.classList.add('clear');
      } else if (n <= 3) {
        countEl.classList.add('warning');
        cardEl.classList.add('flashing-warning');
      } else {
        countEl.classList.add('alert');
        cardEl.classList.add('flashing-alert');
      }
    }

    async function fetchStats() {
      try {
        const res = await fetch(WEBHOOK_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const n = typeof data.calls_waiting === 'number' ? data.calls_waiting : parseInt(data.calls_waiting, 10);
        if (isNaN(n)) throw new Error('Unexpected response format');

        setCount(n);
        dotEl.classList.remove('error');
        statusEl.textContent = 'Live';
        updatedEl.textContent = `Updated ${formatTime(new Date())}`;
        errorEl.style.display = 'none';
      } catch (err) {
        dotEl.classList.add('error');
        statusEl.textContent = 'Error';
        errorEl.style.display = 'block';
        errorEl.textContent = err.message;
      }
    }

    // Initial fetch + start polling
    fetchStats();
    setInterval(fetchStats, POLL_INTERVAL);
  </script>
</body>
</html>
